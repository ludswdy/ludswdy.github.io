<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 페이지 제목 설정 (Jekyll 변수 사용) -->
    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>

    <!-- 외부 폰트 로드 -->
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />

    <!-- 우리가 만들 CSS 파일 연결 -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    />

    <!-- Tailwind CSS (디자인 편의용) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen flex flex-col">
    <!-- 헤더 (모든 페이지 공통) -->
    <header id="main-header" class="w-full fixed top-0 z-10">
      <div class="content-wrapper h-20 flex justify-between items-center">
        <!-- site.title은 _config.yml 파일에서 설정할 수 있습니다. -->
        <a href="{{ '/' | relative_url }}" class="blog-title text-xl"
          >{{ site.title | default: "ludswdy'blog" }}</a
        >
        <nav class="flex space-x-6 text-md">
          <a href="{{ '/' | relative_url }}" class="nav-link">Home</a>
          <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
          <!-- 카테고리 링크는 나중에 기능 구현 후 활성화합니다. -->
          <a href="#" class="nav-link">Categories</a>
        </nav>
      </div>
    </header>

    <!-- 메인 콘텐츠 영역 -->
    <main class="flex-grow pt-20">
      <!-- 이 부분이 각 페이지의 고유한 내용으로 채워집니다. -->
      {{ content }}
    </main>

    <!-- 푸터 (모든 페이지 공통) -->
    <footer class="w-full mt-20">
      <div class="content-wrapper py-8 text-center text-sm">
        <p>
          © {{ 'now' | date: "%Y" }} {{ site.author | default: "ludswdy" }}. All
          rights reserved.
        </p>
        <div class="flex justify-center space-x-4 mt-4">
          <a href="#" class="hover:text-gray-900">GitHub</a>
          <a href="#" class="hover:text-gray-900">LinkedIn</a>
          <a href="#" class="hover:text-gray-900">Email</a>
        </div>
      </div>
    </footer>

    <!-- 우리가 만들 JavaScript 파일 연결 (body 태그 닫기 직전) -->
    <script src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
  </body>
</html>
